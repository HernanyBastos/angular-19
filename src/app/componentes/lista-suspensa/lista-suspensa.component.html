<div class="lista-suspensa">
  <label [attr.for]="id()">{{ label() }}</label>
  <select [id]="id()" [(ngModel)]="value">
    <option [ngValue]="null" disabled>Selecione o gênero do livro</option>
    @for (item of opcoes; track item.id) {
      <option [ngValue]="item">{{ item.value }}</option>
      }
  </select>
</div>
